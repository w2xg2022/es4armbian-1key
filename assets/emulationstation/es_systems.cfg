<!-- This is the EmulationStation Systems configuration file. -->
<systemList>
	<system>
		<name>snes</name>
		<fullname>Super Nintendo Entertainment System</fullname>
		<path>/home/game/ROMs/snes</path>
		<extension>.smc .sfc .SMC .SFC .zip .ZIP</extension>
		<command>retroarch -L /home/game/.config/retroarch/cores/snes9x_libretro.so %ROM%</command>
		<platform>snes</platform>
		<theme>snes</theme>
	</system>
	<system>
		<name>nes</name>
		<fullname>Nintendo Entertainment System</fullname>
		<path>/home/game/ROMs/nes</path>
		<extension>.nes .NES .zip .ZIP</extension>
		<command>retroarch -L /home/game/.config/retroarch/cores/nestopia_libretro.so %ROM%</command>
		<platform>nes</platform>
		<theme>nes</theme>
	</system>
</systemList>
